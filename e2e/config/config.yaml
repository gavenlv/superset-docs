# Superset E2E 测试全局配置
# 可被环境变量覆盖（参见 config/settings.py 与 e2e/README.md 中的"环境变量"章节）
#
# 优先级: 环境变量 > 本文件

# ----------------------------------------------------------------------------
# 模式
# ----------------------------------------------------------------------------
# - reuse: 复用已启动的 Superset 容器（默认；适合本地/CI 默认行为）
# - cold:  测试运行前 docker compose down -v && up -d，从零加载示例数据
mode: reuse

# cold 模式结束后是否清理容器
# true:  跑完测试 docker compose down（保留数据卷）
# false: 保留容器，可继续访问 Web UI 调试
cleanup_on_exit: true

# ----------------------------------------------------------------------------
# 凭据
# ----------------------------------------------------------------------------
admin_username: admin
admin_password: admin

# ----------------------------------------------------------------------------
# 浏览器
# ----------------------------------------------------------------------------
# chromium | firefox | webkit
browser: chromium
# true=无头模式（CI/服务器）；false=有头模式（本地调试方便看 UI）
headless: true

# 浏览器操作超时（毫秒）
page_timeout_ms: 30000       # 单个 locator 等待 / 填写 / 点击
navigation_timeout_ms: 60000  # page.goto 默认超时

# ----------------------------------------------------------------------------
# 失败重试
# ----------------------------------------------------------------------------
reruns: 2         # 失败后重试次数
reruns_delay: 3   # 每次重试前等待秒数

# ----------------------------------------------------------------------------
# Superset 实例
# ----------------------------------------------------------------------------
# 每个实例对应一个 docker-compose 子项目。
# base_url 是浏览器访问入口；compose_dir 是相对 e2e/ 的相对路径。
#
# 自定义实例可通过环境变量覆盖 base_url（不影响容器端口）：
#   E2E_BASE_URL_4_1=http://192.168.1.10:18088
#   E2E_BASE_URL_6_0=http://192.168.1.10:18089
#
# 自定义容器端口请修改对应 superset-<ver>/docker-compose.yml 中的
# POSTGRES_PORT / REDIS_PORT / SUPERSET_PORT 环境变量。
instances:
  - name: 4.1
    version: 4.1.1
    base_url: "http://localhost:18088"
    compose_dir: ../superset-4.1
    postgres_container: superset-4.1-postgres
    redis_container: superset-4.1-redis

  - name: 6.0
    version: 6.0.0
    base_url: "http://localhost:18089"
    compose_dir: ../superset-6.0
    postgres_container: superset-6.0-postgres
    redis_container: superset-6.0-redis

# ----------------------------------------------------------------------------
# 性能测试（重点压 dashboard / charts / chart_data）
# ----------------------------------------------------------------------------
perf:
  enabled: true
  framework: locust               # locust | k6 | both
  duration_sec: 600               # 单次压测时长（10 分钟，更稳的 p95/p99）
  spawn_rate: 20                  # 每秒拉起用户数（加快 ramp-up）
  users: 200                      # 峰值用户数（提高 4x，聚焦重点查询）

  # 角色权重（与 perf/locust/tasks/ 对应）
  role_weights:
    admin_ops: 1
    analyst: 10
    viewer: 30                    # 重点：dashboard / chart 读路径
    embed: 8

  # 数据集规模（可复制示例数据，模拟生产规模）
  dataset_multiplier: 5           # 5x 示例数据（默认 25 → 125 dataset）

  baseline_dir: perf/baselines

  # 阈值（按类别分级；重点查询更严格）
  thresholds:
    p95_warn_pct: 15
    p95_fail_pct: 20              # 重点查询统一 fail 阈值
    p95_fail_pct_critical: 15     # chart/data 最重查询更严
    p95_warn_pct_normal: 20
    p95_fail_pct_normal: 50
    error_rate_fail_pct: 0.5      # 重点查询 0.5%
    error_rate_fail_pct_normal: 1.0

  docker_metrics: true            # 抓容器 CPU/内存
  reports_dir: perf/reports
  k6_binary: k6                   # 或 docker run grafana/k6

  # 重点查询白名单（用于精准对比）
  # 注意：6.0 路径无尾斜杠（/charts 不带 /），payload 见 PLAN.md §5.2
  critical_endpoints:
    - GET:/api/v1/dashboard/
    - GET:/api/v1/dashboard/{id}
    - GET:/api/v1/dashboard/{id}/charts
    - GET:/superset/dashboard/{id}/
    - GET:/api/v1/chart/
    - GET:/api/v1/chart/{id}
    - POST:/api/v1/chart/data
